        <h2>Contact Us</h2>

        <form>
            <div class="mb-3">

            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Message</label>
                <textarea class="form-control" required></textarea>
            </div>

            <button class="btn btn-primary">Submit</button>
        </form>
    </section>
