<section class="container my-5">

    <div class="row">

        <!--  CONTACT INFO (LEFT SIDE) -->
        <div class="col-md-6 mb-4">

            <h3>📩 Contact Us</h3>

            <p>Send us your feedback or questions!</p>

            <p><strong>Phone:</strong> (267) 74242422</p>
            <p><strong>Email:</strong> info@chessacademy.com</p>
            <p><strong>Location:</strong> Gaborone, Botswana</p>

        </div>

        <!-- FEEDBACK FORM (RIGHT SIDE) -->
        <div class="col-md-6">

            <h3 class="mb-4">Feedback Form</h3>

            <form onsubmit="alert('Form submitted!'); return false;">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="4" required></textarea>
                </div>

                <button class="btn btn-primary w-100">Submit</button>

            </form>

        </div>

    </div>

</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
